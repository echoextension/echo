<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECHO 易可 - 新标签页</title>
  <script src="blank-init.js"></script>
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon16.png?v=3.6.38">
  <link rel="icon" type="image/png" sizes="48x48" href="/icons/icon48.png?v=3.6.38">
  <link rel="stylesheet" href="blank-critical.css">
  <link rel="stylesheet" href="ntp.css">
  <script defer src="../common/lowpoly-bg.js"></script>
</head>
<body>
  <!-- 壁纸背景层 -->
  <div class="wallpaper-bg" id="wallpaperBg"></div>
  
  <!-- 左上角：壁纸信息区 -->
  <div class="wallpaper-info-wrapper" id="wallpaperInfoWrapper">
    <!-- 收起时显示的圆点 -->
    <div class="wallpaper-info-dot" id="wallpaperInfoDot"></div>
    <!-- 完整信息卡片 -->
    <div class="wallpaper-info" id="wallpaperInfo">
      <div class="wallpaper-source-row">
        <span class="wallpaper-source">必应每日壁纸</span>
        <span class="wallpaper-search-link">点击以搜索更多</span>
      </div>
      <div class="wallpaper-title" id="wallpaperTitle"></div>
      <div class="wallpaper-meta">
        <span class="wallpaper-copyright" id="wallpaperCopyright"></span>
        <span class="wallpaper-date" id="wallpaperDate"></span>
      </div>
    </div>
  </div>
  
  <!-- 右上角：壁纸操作按钮 -->
  <div class="wallpaper-actions" id="wallpaperActions">
    <button class="wp-action-btn" id="wpRandom" title="随机换一张壁纸">
      <svg viewBox="0 0 24 24" class="wp-icon"><path fill="currentColor" d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      <span class="wp-action-text">换一张</span>
    </button>
    <div class="wp-btn-group" id="wpFavoriteGroup">
      <button class="wp-action-btn wp-btn-main" id="wpFavorite" title="收藏壁纸">
        <svg viewBox="0 0 24 24" class="wp-icon wp-heart"><path fill="currentColor" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        <span class="wp-action-text" id="wpFavoriteText">收藏壁纸</span>
      </button>
      <button class="wp-action-btn wp-btn-secondary" id="wpFavoriteManage" title="管理壁纸库">管理</button>
    </div>
    <button class="wp-action-btn" id="wpSetWallpaper" title="锁定壁纸">
      <svg viewBox="0 0 24 24" class="wp-icon"><path fill="currentColor" d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
      <span class="wp-action-text" id="wpSetWallpaperText">锁定壁纸</span>
    </button>
    <button class="wp-action-btn wp-settings-btn" id="wpSettingsBtn" title="设置">
      <svg viewBox="0 0 24 24" class="wp-icon"><path fill="currentColor" d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      <span class="wp-action-text">设置</span>
    </button>
  </div>
  
  <!-- 设置面板 -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-body">
      <div class="settings-section">
        <div class="settings-row">
          <span class="settings-label">使用空白新标签页</span>
          <label class="toggle-switch">
            <input type="checkbox" id="blankModeSwitch">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <div class="settings-blank-notice" id="blankModeNotice" hidden>
        已启用空白新标签页。关闭此开关后可恢复其它设置。
      </div>

      <div class="settings-content" id="settingsContent">
      <!-- 热搜榜设置 -->
      <div class="settings-section">
        <div class="settings-row">
          <span class="settings-label">热搜榜</span>
          <label class="toggle-switch">
            <input type="checkbox" id="trendingSwitch" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      
      <!-- 极简模式开关 -->
      <div class="settings-section">
        <div class="settings-row">
          <span class="settings-label">右上角按钮极简模式</span>
          <label class="toggle-switch">
            <input type="checkbox" id="minimalModeSwitch">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      
      <!-- 壁纸设置 -->
      <div class="settings-section" id="wallpaperSettingsSection">
        <div class="settings-row">
          <span class="settings-label">壁纸背景</span>
          <label class="toggle-switch">
            <input type="checkbox" id="wallpaperSwitch" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
        <!-- 壁纸开启时才显示的详细设置 -->
        <div class="wallpaper-sub-settings" id="wallpaperSubSettings">
          <!-- 自动隐藏开关 -->
          <div class="settings-row settings-row-sub">
            <span class="settings-label">壁纸信息展示一次后自动隐藏</span>
            <label class="toggle-switch">
              <input type="checkbox" id="autoHideInfoSwitch">
              <span class="toggle-slider"></span>
            </label>
          </div>
          
          <!-- 壁纸来源标题 -->
          <div class="settings-subtitle">壁纸来源</div>
          
          <!-- 壁纸来源选择器 -->
          <div class="source-selector">
            <!-- 必应每日壁纸 -->
            <label class="source-card" id="sourceDailyCard">
              <input type="radio" name="wallpaperSource" value="daily" id="sourceDaily">
              <div class="source-card-content">
                <div class="source-card-header">
                  <svg viewBox="0 0 24 24" class="source-icon"><path fill="currentColor" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5.04-6.71l-2.75 3.54-1.96-2.36L6.5 17h11l-3.54-4.71z"/></svg>
                  <span class="source-title">必应每日壁纸</span>
                  <span class="source-check"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span>
                </div>
                <div class="source-desc">每天自动更换精美壁纸</div>
                <!-- 当前壁纸信息（选中时显示） -->
                <div class="source-current" id="sourceDailyCurrent"></div>
              </div>
            </label>
            
            <!-- 我的壁纸库 -->
            <label class="source-card" id="sourceCollectionCard">
              <input type="radio" name="wallpaperSource" value="collection" id="sourceCollection">
              <div class="source-card-content">
                <div class="source-card-header">
                  <svg viewBox="0 0 24 24" class="source-icon"><path fill="currentColor" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                  <span class="source-title">我的壁纸库</span>
                  <span class="source-count" id="sourceCollectionCount">(0张)</span>
                  <span class="source-check"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span>
                </div>
                <div class="source-desc">看到喜欢的壁纸，可以藏到壁纸库。支持每日随机或固定一张</div>
                <!-- 播放模式（选中时显示） -->
                <div class="play-mode-selector" id="playModeSelector">
                  <button class="play-mode-btn active" data-mode="random" id="playModeRandomBtn">每日随机</button>
                  <button class="play-mode-btn" data-mode="fixed" id="playModeFixedBtn">固定一张</button>
                </div>
              </div>
            </label>
          </div>
          
          <!-- 锁定状态显示区域（当用户手动设为壁纸时显示） -->
          <div class="locked-status-card" id="lockedStatusCard">
            <div class="locked-status-row">
              <div class="locked-status-icon">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
              </div>
              <span class="locked-status-label">当前锁定为单张壁纸</span>
              <button class="locked-status-unlock" id="lockedStatusUnlock">解除锁定</button>
            </div>
            <div class="locked-status-title" id="lockedStatusTitle"></div>
          </div>
          
          <!-- 管理壁纸库按钮 -->
          <button class="wallpaper-settings-btn" id="manageCollectionBtn">
            <span>管理壁纸库 <span id="manageCollectionCount">(0)</span></span>
            <svg viewBox="0 0 24 24" class="arrow-icon"><path fill="currentColor" d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
          </button>
        </div>
      </div>
      
      <!-- ECHO 插件设置入口 -->
      </div>

      <div class="settings-section settings-section-footer">
        <button class="echo-settings-btn" id="echoSettingsBtn">
          <div class="echo-settings-left">
            <img src="../icons/icon16.png" class="echo-settings-icon" alt="ECHO">
            <span>ECHO 插件设置</span>
          </div>
          <svg viewBox="0 0 24 24" class="arrow-icon"><path fill="currentColor" d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </button>
      </div>
    </div>
  </div>
  
  <!-- 收藏面板背景遮罩 -->
  <div class="collection-backdrop" id="collectionBackdrop"></div>
  
  <!-- 我的壁纸库管理面板（L3） -->
  <div class="collection-panel" id="collectionPanel">
    <div class="collection-header">
      <span class="collection-title">我的壁纸库</span>
      <button class="collection-close" id="collectionClose" title="关闭">
        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    
    <!-- Tab 切换 -->
    <div class="collection-tabs">
      <button class="collection-tab active" id="tabFavorites" data-tab="favorites">
        <svg viewBox="0 0 24 24" class="tab-icon"><path fill="currentColor" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        我的收藏 <span class="tab-count" id="tabFavoritesCount">(0)</span>
      </button>
      <button class="collection-tab" id="tabHistory" data-tab="history">
        <svg viewBox="0 0 24 24" class="tab-icon"><path fill="currentColor" d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
        历史足迹 <span class="tab-count" id="tabHistoryCount">(0)</span>
      </button>
    </div>
    
    <!-- 收藏网格 -->
    <div class="collection-body" id="collectionBody">
      <div class="collection-empty" id="collectionEmpty">
        <svg viewBox="0 0 24 24" class="empty-icon"><path fill="currentColor" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        <p>壁纸库是空的</p>
        <p class="empty-hint">收藏 Bing 壁纸，或上传自己的图片</p>
      </div>
      <div class="collection-grid" id="collectionGrid"></div>
    </div>
    <!-- 自定义壁纸上传 (hidden file input) -->
    <input type="file" id="customWallpaperInput" accept="image/jpeg,image/png,image/webp" hidden>
    <!-- 备份入口 -->
    <div class="collection-footer">
      <a href="#" class="collection-backup-link" id="collectionBackupLink">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        备份与恢复
      </a>
    </div>
  </div>
  
  <div class="container">
    <!-- ECHO Logo + Brand -->
    <div class="brand">
      <div class="brand-header">
        <img src="../icons/icon128.png" class="logo-icon" alt="ECHO Logo">
        <div class="brand-title">
          <h1>ECHO <span class="brand-cn">易可</span></h1>
        </div>
      </div>
    </div>
    
    <!-- 搜索框 -->
    <form class="search-form" action="https://www.bing.com/search" method="GET">
      <div class="search-box">
        <svg class="search-icon-left" viewBox="0 0 24 24" fill="none" stroke="#0078d4" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
        <input 
          type="text" 
          name="q" 
          id="searchInput"
          class="search-input" 
          placeholder="搜索 Bing..." 
          autocomplete="off"
          autofocus
        >
        <button type="button" class="search-clear" id="searchClear" title="清除">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
        <button type="submit" class="search-button">
          <svg viewBox="0 0 24 24" class="search-icon">
            <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
          </svg>
        </button>
      </div>
      <!-- Bing 搜索建议下拉 -->
      <div class="search-suggest" id="searchSuggest"></div>
    </form>
    
    <!-- 热搜榜单 -->
    <div class="trending-section" id="trendingSection">
      <div class="trending-header">
        <span class="trending-title trending-loading-hide" id="trendingTitle"><span class="trending-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></span>热搜</span>
        <span class="trending-update-time trending-loading-hide" id="trendingUpdateTime"></span>
      </div>
      <div class="trending-body">
        <!-- 左右切换箭头 -->
        <button class="trending-arrow prev" id="trendingPrev" aria-label="上一页">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        </button>
        <button class="trending-arrow next" id="trendingNext" aria-label="下一页">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </button>
        
        <div class="trending-grid" id="trendingList"></div>
        <div class="trending-dots" id="trendingDots"></div>
      </div>
    </div>
  </div>
  
  <!-- 底部 Footer - 放在 container 外面 -->
  <footer class="ntp-footer">
    <p class="footer-text">Made with ❤️ for Chinese Edge users</p>
  </footer>
  
  <!-- 超级 Bing 悬浮搜索框（Ctrl+B） -->
  <script src="../search-box/search-box.js"></script>

  <script src="wallpaper-data.js"></script>
  <script src="ntp.js"></script>
</body>
</html>
