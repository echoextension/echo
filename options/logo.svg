<svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <!-- 阴影优化：由于背景变浅，阴影颜色稍微加深一点，但扩散范围收一点，更锐利 -->
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#001030" flood-opacity="0.5"/>
    </filter>
    <clipPath id="round-corner">
        <rect x="0" y="0" width="72" height="72" rx="18" />
    </clipPath>
  </defs>
  
  <!-- Low Poly 背景：Edge 品牌色系 (提亮版) -->
  <g clip-path="url(#round-corner)">
    <!-- 上方：更明亮的天蓝 -->
    <path d="M0 0 L72 0 L36 36 Z" fill="#50D2F4" />
    
    <!-- 右侧：更清透的青绿 -->
    <path d="M72 0 L72 72 L36 36 Z" fill="#4CE0B0" />
    
    <!-- 下方：提亮的深蓝，避免黑色感 -->
    <path d="M72 72 L0 72 L36 36 Z" fill="#1E6296" />
    
    <!-- 左侧：明快的品牌蓝 -->
    <path d="M0 72 L0 0 L36 36 Z" fill="#3FA9F5" />
  </g>
  
  <g filter="url(#shadow)">
    <!-- 负空间设计：E -->
    <!-- 增加描边：使用极细的深色半透明描边，增强边缘界限感，防止白色与浅色背景晕染 -->
    <path d="
      M 20 18 
      H 56 
      L 46 28 
      H 32 
      V 32 
      H 50 
      L 50 40 
      H 32 
      V 44 
      H 46 
      L 56 54 
      H 20 
      A 2 2 0 0 1 18 52
      V 20
      A 2 2 0 0 1 20 18
      Z
    " fill="white" stroke="#003050" stroke-width="0.5" stroke-opacity="0.45" />
  </g>
</svg>