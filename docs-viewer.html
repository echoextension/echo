<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECHO - 文档</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --text-secondary: #555;
      --border: #e5e7eb;
      --code-bg: #f6f8fa;
      --link: #0969da;
      --blockquote-border: #d0d7de;
      --blockquote-text: #636c76;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --text: #e0e0e0;
        --text-secondary: #aaa;
        --border: #3a3a3a;
        --code-bg: #2d2d2d;
        --link: #58a6ff;
        --blockquote-border: #444;
        --blockquote-text: #999;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.9;
      padding: 48px 24px;
      max-width: 820px;
      margin: 0 auto;
    }

    /* Loading / Error */
    .status {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    /* Markdown Rendered Content */
    .md-body h1 { font-size: 1.8em; font-weight: 700; margin: 1em 0 0.5em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border); }
    .md-body h2 { font-size: 1.5em; font-weight: 600; margin: 1.4em 0 0.5em; padding-bottom: 0.25em; border-bottom: 1px solid var(--border); }
    .md-body h3 { font-size: 1.25em; font-weight: 600; margin: 1.2em 0 0.4em; }
    .md-body h4 { font-size: 1.1em; font-weight: 600; margin: 1em 0 0.3em; }

    .md-body p { margin: 0.8em 0; }

    .md-body ul, .md-body ol { margin: 0.7em 0; padding-left: 2em; }
    .md-body li { margin: 0.35em 0; line-height: 1.8; }
    .md-body li > ul, .md-body li > ol { margin: 0.2em 0; }

    .md-body strong { font-weight: 600; }
    .md-body em { font-style: italic; }

    .md-body code {
      background: var(--code-bg);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-size: 0.9em;
      font-family: "Sarasa Mono SC", "Cascadia Mono", "SF Mono", Consolas, "Liberation Mono", Menlo, "Courier New", monospace;
    }

    .md-body pre {
      background: var(--code-bg);
      padding: 18px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 1em 0;
      white-space: pre;
      tab-size: 4;
    }

    .md-body pre code {
      background: none;
      padding: 0;
      font-size: 14px;
      line-height: 1.5;
      letter-spacing: 0;
      font-variant-ligatures: none;
      -webkit-font-smoothing: antialiased;
      font-family: "Sarasa Mono SC", "Noto Sans Mono CJK SC", "Source Han Mono SC", "Cascadia Mono", "SF Mono", Consolas, "Liberation Mono", Menlo, "Courier New", monospace;
    }

    .md-body a {
      color: var(--link);
      text-decoration: none;
    }
    .md-body a:hover { text-decoration: underline; }

    .md-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5em 0;
    }

    .md-body blockquote {
      border-left: 3px solid var(--blockquote-border);
      padding: 0.3em 1.2em;
      margin: 0.8em 0;
      color: var(--blockquote-text);
    }

    /* Back link */
    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--link);
      text-decoration: none;
      opacity: 0.8;
    }
    .back-link:hover { opacity: 1; text-decoration: underline; }

    /* Floating TOC */
    .toc-nav {
      position: fixed;
      left: 16px;
      top: 80px;
      width: 300px;
      max-height: calc(100vh - 120px);
      overflow-y: auto;
      padding: 12px 0;
      font-size: 15px;
      line-height: 1.5;
      opacity: 0;
      transform: translateX(-8px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .toc-nav.show {
      opacity: 1;
      transform: translateX(0);
    }

    .toc-nav::-webkit-scrollbar { width: 3px; }
    .toc-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .toc-item {
      display: block;
      padding: 4px 12px;
      color: var(--text-secondary);
      text-decoration: none;
      border-left: 2px solid transparent;
      transition: all 0.15s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toc-item:hover {
      color: var(--text);
    }

    .toc-item.active {
      color: var(--link);
      border-left-color: var(--link);
      font-weight: 500;
    }

    .toc-item.toc-h2 { padding-left: 24px; font-size: 14px; }
    .toc-item.toc-h3 { padding-left: 36px; font-size: 13px; color: var(--blockquote-text); }

    /* Back to top button */
    .back-to-top {
      position: fixed;
      right: 32px;
      bottom: 32px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--link);
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 20px;
      line-height: 40px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.25s ease, transform 0.25s ease, background 0.15s ease;
      pointer-events: none;
      z-index: 100;
    }
    .back-to-top.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .back-to-top:hover {
      background: var(--text);
    }

    /* Hide TOC on narrow screens where it would overlap content */
    @media (max-width: 1200px) {
      .toc-nav { display: none; }
    }
  </style>
</head>
<body>
  <nav id="toc" class="toc-nav"></nav>
  <a href="#" class="back-link" id="backLink" style="display:none;">← 返回设置</a>
  <div id="content" class="status">加载中...</div>
  <button id="backToTop" class="back-to-top" title="返回顶部">↑</button>

  <script src="docs-viewer.js"></script>
  <!-- 鼠标手势模块 - 右键+滚轮切换标签 -->
  <script src="common/mouse-gesture.js"></script>
  <!-- 超级拖拽模块 - 拖拽文字搜索 -->
  <script src="common/super-drag.js"></script>
  <!-- 快捷键增强模块 - 精细缩放 + F2/F3 切换标签 -->
  <script src="common/keyboard-enhance.js"></script>
  <!-- 超级 Bing 悬浮搜索框（Ctrl+B） -->
  <script src="search-box/search-box.js"></script>
</body>
</html>
