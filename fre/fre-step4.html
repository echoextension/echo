<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECHO 易可 - 设置完成</title>
  <style>
    /* ========== 基础变量 - 与 Step 1/2/3 完全一致 ========== */
    :root {
      --text-dark: #1a1a1a;
      --text-medium: #4a4a4a;
      --text-light: #888888;
      --accent: #0D9488;
      --accent-light: #14B8A6;
      /* NTP 背景变量 */
      --bg-gradient-start: #ffffff;
      --bg-gradient-mid: rgba(0, 88, 255, 0.06);
      --bg-gradient-end: rgba(119, 116, 255, 0.075);
      --bg-accent: rgba(1, 177, 253, 0.03);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text-dark: #f0f0f0;
        --text-medium: #b0b0b0;
        --text-light: #808080;
        --bg-gradient-start: #1a1a2e;
        --bg-gradient-mid: rgba(0, 88, 255, 0.08);
        --bg-gradient-end: rgba(119, 116, 255, 0.1);
        --bg-accent: rgba(1, 177, 253, 0.05);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* 渐变背景旋转动画 */
    @property --gradient-angle {
      syntax: '<angle>';
      initial-value: 180deg;
      inherits: false;
    }

    @keyframes rotateGradient {
      0% { --gradient-angle: 0deg; }
      100% { --gradient-angle: 360deg; }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      background: transparent;
      overflow-x: hidden;
    }

    /* ========== 主容器 ========== */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 40px 90px;
    }

    .content {
      width: 100%;
      max-width: 880px;
      text-align: center;
    }

    /* ========== 页面标题区 ========== */
    .page-header {
      text-align: center;
      margin-bottom: 24px;
      flex-shrink: 0;
    }

    .page-title {
      font-size: 56px;
      font-weight: 700;
      margin-bottom: 24px;
      letter-spacing: -1px;
      /* 四色渐变流动动画 - 复制自 options.html */
      background: linear-gradient(90deg, #1a5fb4, #3584e4, #00b7c3, #2ec27e, #1a5fb4);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: titleGradientFlow 8s linear infinite;
    }

    .page-subtitle {
      font-size: 20px;
      color: var(--text-medium);
      line-height: 1.6;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .page-subtitle::before,
    .page-subtitle::after {
      content: '';
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--text-light), transparent);
    }

    /* ========== 成功图标 ========== */
    .success-icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 32px;
      background: linear-gradient(145deg, #10B981, #059669);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 
        0 8px 32px rgba(16, 185, 129, 0.4),
        0 4px 12px rgba(16, 185, 129, 0.2);
      animation: successPulse 2s ease-in-out infinite;
    }

    .success-icon svg {
      width: 60px;
      height: 60px;
      stroke: #fff;
      stroke-width: 3;
      fill: none;
    }

    @keyframes successPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 8px 32px rgba(16, 185, 129, 0.4), 0 4px 12px rgba(16, 185, 129, 0.2); }
      50% { transform: scale(1.05); box-shadow: 0 12px 48px rgba(16, 185, 129, 0.5), 0 6px 16px rgba(16, 185, 129, 0.3); }
    }

    /* ========== 功能提示 ========== */
    .tips-section {
      margin: 40px 0;
      padding: 24px 32px;
      background: rgba(30, 98, 150, 0.04);
      border-radius: 16px;
      text-align: left;
    }

    .tips-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 16px;
    }

    .tips-list {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 12px 24px;
    }

    .tips-list li {
      font-size: 14px;
      color: var(--text-medium);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tips-list li::before {
      content: '✓';
      color: #10B981;
      font-weight: 700;
    }

    /* ========== 双按钮区域 ========== */
    .nav-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      margin-top: 172px;
      flex-shrink: 0;
    }

    /* 主按钮 - 开始上网 */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 56px;
      font-size: 24px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 
        inset 0 2px 4px rgba(0,0,0,0.3),
        inset 0 -1px 2px rgba(255,255,255,0.05),
        0 4px 16px rgba(0,0,0,0.2);
      text-shadow: 0 -1px 1px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.08);
    }

    .cta-btn:hover {
      transform: translateY(-4px);
      background: linear-gradient(145deg, #404040, #2a2a2a);
      box-shadow: 
        inset 0 2px 4px rgba(0,0,0,0.2),
        inset 0 -1px 2px rgba(255,255,255,0.08),
        0 12px 32px rgba(0,0,0,0.3),
        0 0 24px rgba(63, 169, 245, 0.2);
      border-color: rgba(63, 169, 245, 0.25);
    }

    .cta-btn:active {
      transform: translateY(0);
      box-shadow: 
        inset 0 3px 6px rgba(0,0,0,0.4),
        inset 0 -1px 1px rgba(255,255,255,0.03),
        0 2px 8px rgba(0,0,0,0.2);
    }

    /* 次要按钮 - 进入设置 */
    .secondary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 56px;
      font-size: 24px;
      font-weight: 600;
      color: var(--text-dark);
      background: transparent;
      border: 2px solid rgba(0,0,0,0.2);
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .secondary-btn:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.5);
      border-color: rgba(30, 98, 150, 0.4);
      color: #3B82F6;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }

    .secondary-btn:active {
      transform: translateY(0);
      box-shadow: none;
    }

    /* ========== 品牌区域 - 固定在左上角 ========== */
    .brand-section {
      position: absolute;
      top: 32px;
      left: 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 100;
    }

    .brand-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0, 120, 212, 0.3);
      flex-shrink: 0;
    }

    .brand-text {
      text-align: left;
    }

    .brand-name {
      font-size: 22px;
      font-weight: 700;
      color: #737373;
      line-height: 1.2;
    }

    .brand-slogan {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.2px;
      background: linear-gradient(90deg, #1a5fb4, #3584e4, #00b7c3, #2ec27e, #1a5fb4);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.4;
    }

    .brand-slogan .acronym {
      font-size: 14px;
      font-weight: 700;
    }

    /* ========== 右上角步骤指示器 ========== */
    .step-indicator {
      position: fixed;
      top: 36px;
      right: 40px;
      display: flex;
      align-items: center;
      gap: 0;
      z-index: 100;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .step-indicator .step-item {
      display: flex;
      align-items: center;
    }

    .step-indicator .step-line {
      width: 40px;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, #c0c0c0, transparent);
      margin: 0 4px;
    }

    .step-indicator .step-label {
      padding: 8px 16px;
      color: #a0a0a0;
      border-radius: 20px;
      transition: all 0.3s ease;
      background: transparent;
    }

    .step-indicator .step-label.active {
      color: #10B981;
      font-weight: 600;
      background: rgba(16, 185, 129, 0.1);
    }

    .step-indicator .step-label.completed {
      color: #666;
    }

    .step-indicator .step-label.clickable {
      cursor: pointer;
    }

    .step-indicator .step-label.clickable:hover {
      background: rgba(30, 98, 150, 0.06);
      color: #3B82F6;
    }

    @media (prefers-color-scheme: dark) {
      .step-indicator .step-label.clickable:hover {
        background: rgba(91, 184, 245, 0.08);
        color: #5bb8f5;
      }
    }

    /* 激活状态前后的横线颜色加深 */
    .step-indicator .step-item.active .step-line,
    .step-indicator .step-item.completed .step-line {
      background: linear-gradient(90deg, transparent, #10B981, transparent);
      opacity: 0.4;
    }

    @media (prefers-color-scheme: dark) {
      .step-indicator .step-line {
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      }
      .step-indicator .step-label {
        color: rgba(255,255,255,0.35);
      }
      .step-indicator .step-label.active {
        color: #34d399;
        background: rgba(52, 211, 153, 0.1);
      }
      .step-indicator .step-label.completed {
        color: rgba(255,255,255,0.55);
      }
      .step-indicator .step-item.active .step-line,
      .step-indicator .step-item.completed .step-line {
        background: linear-gradient(90deg, transparent, #34d399, transparent);
        opacity: 0.3;
      }
    }

    /* ========== 底部 Footer ========== */
    .fre-footer {
      position: fixed;
      bottom: 12px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 10;
    }
    .fre-footer .footer-text {
      font-size: 14px;
      color: #999;
      line-height: 1.4;
    }
    @media (prefers-color-scheme: dark) {
      .fre-footer .footer-text {
        color: rgba(255, 255, 255, 0.5);
      }
    }

    /* ========== 暗色模式适配 ========== */
    @media (prefers-color-scheme: dark) {
      .success-icon {
        box-shadow: 
          0 8px 32px rgba(16, 185, 129, 0.3),
          0 4px 12px rgba(16, 185, 129, 0.15);
      }

      .tips-section {
        background: rgba(91, 184, 245, 0.06);
      }

      .secondary-btn {
        background: rgba(50, 50, 55, 0.9);
        border-color: rgba(255,255,255,0.1);
        color: var(--text-dark);
      }

      .secondary-btn:hover {
        background: rgba(60, 65, 75, 0.95);
        border-color: rgba(91, 184, 245, 0.4);
        color: #5bb8f5;
      }
    }

    /* 小屏幕高度优化 - 解决布局拥挤问题 */
    @media (max-height: 900px) {
      .page {
        padding: 120px 40px 100px;  /* 增加顶部间距，避开 Brand 区域 */
        justify-content: flex-start; /* 改为从顶部开始，防止垂直居中导致被切断 */
      }
      
      .brand-section {
        top: 16px;  /* 更靠上 */
        left: 32px;
      }
      
      .step-indicator {
        top: 20px;  /* 更靠上 */
        right: 32px;
      }
      
      .page-header {
        margin-top: 0; /* 移除标题的顶部间距，由 padding 控制整体位置 */
        margin-bottom: 24px;
      }
      
      .page-title {
        font-size: 44px;
        margin-bottom: 16px;
      }
      
      .page-subtitle {
        font-size: 16px;
      }
      
      .success-icon {
        width: 100px;
        height: 100px;
        margin: 0 auto 24px;
      }
      .success-icon svg {
        width: 50px;
        height: 50px;
      }
      
      /* 双按钮区域上提 */
      .nav-footer {
        margin-top: 100px; /* 从 172px 减小 */
        gap: 16px;
      }
      
      .cta-btn, .secondary-btn {
        padding: 12px 40px;
        font-size: 20px;
      }
    }

    /* 极小屏幕高度 */
    @media (max-height: 700px) {
      .page-header {
        margin-top: 40px;
      }
      .success-icon {
        width: 80px;
        height: 80px;
      }
      .success-icon svg {
        width: 40px;
        height: 40px;
      }
      .nav-footer {
        margin-top: 60px;
      }
    }
  </style>
  <!-- Low Poly 背景 -->
  <script>
    window.LowPolyConfig = { autoInit: true };
  </script>
  <script src="../common/lowpoly-bg.js"></script>
</head>
<body>
  <!-- 品牌区域 - 左上角 -->
  <div class="brand-section">
    <img src="../icons/icon128.png" class="brand-icon" alt="ECHO Logo">
    <div class="brand-text">
      <div class="brand-name">ECHO 易可</div>
    </div>
  </div>

  <!-- 主内容区 -->
  <div class="page">
    <div class="content">
      <!-- 成功图标 -->
      <div class="success-icon">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>

      <!-- 页面标题 -->
      <header class="page-header">
        <h1 class="page-title">一切就绪！</h1>
        <p class="page-subtitle">ECHO 已准备好提升你的浏览体验</p>
      </header>



      <!-- 双按钮区域 -->
      <nav class="nav-footer">
        <button class="secondary-btn" id="settingsBtn">调整设置</button>
        <button class="cta-btn" id="browseBtn">开始上网</button>
      </nav>
    </div>
  </div>

  <!-- 底部 Footer -->
  <footer class="fre-footer">
    <p class="footer-text">Made with ❤️ for Chinese Edge users &nbsp;·&nbsp; <a href="https://github.com/echoextension/echo" target="_blank" style="display: inline-flex; align-items: center; gap: 3px; color: #0078d4; text-decoration: none; vertical-align: middle;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 11px; height: 11px;"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>开源仓库 | GitHub</a></p>
  </footer>

  <!-- 右上角步骤指示器（可点击导航） -->
  <div class="step-indicator">
    <div class="step-item">
      <span class="step-label clickable" data-href="fre-step1.html">开始</span>
      <span class="step-line"></span>
    </div>
    <div class="step-item">
      <span class="step-label clickable" data-href="fre-step2.html">核心功能</span>
      <span class="step-line"></span>
    </div>
    <div class="step-item">
      <span class="step-label clickable" data-href="fre-step3.html">悬浮搜索</span>
      <span class="step-line"></span>
    </div>
    <div class="step-item active">
      <span class="step-label active">完成</span>
    </div>
  </div>

  <!-- FRE 通用脚本 -->
  <script src="fre.js"></script>
  <!-- 鼠标手势模块 - 右键+滚轮切换标签 -->
  <script src="../common/mouse-gesture.js"></script>
  <!-- 超级拖拽模块 - 拖拽文字搜索 -->
  <script src="../common/super-drag.js"></script>
  <!-- 快捷键增强模块 - 精细缩放 + F2/F3 切换标签 -->
  <script src="../common/keyboard-enhance.js"></script>
  <!-- 超级 Bing 悬浮搜索框（Ctrl+B） -->
  <script src="../search-box/search-box.js"></script>
</body>
</html>
