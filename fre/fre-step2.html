<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECHO 易可 - 核心功能</title>
  <style>
    /* ========== 基础变量 - 与 Step 1 完全一致 ========== */
    :root {
      --text-dark: #1a1a1a;
      --text-medium: #4a4a4a;
      --text-light: #888888;
      --accent: #0D9488;
      --accent-light: #14B8A6;
      /* NTP 背景变量 */
      --bg-gradient-start: #ffffff;
      --bg-gradient-mid: rgba(0, 88, 255, 0.06);
      --bg-gradient-end: rgba(119, 116, 255, 0.075);
      --bg-accent: rgba(1, 177, 253, 0.03);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text-dark: #f0f0f0;
        --text-medium: #b0b0b0;
        --text-light: #808080;
        --bg-gradient-start: #1a1a2e;
        --bg-gradient-mid: rgba(0, 88, 255, 0.08);
        --bg-gradient-end: rgba(119, 116, 255, 0.1);
        --bg-accent: rgba(1, 177, 253, 0.05);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* 渐变背景旋转动画 - 与 Step 1 一致 */
    @property --gradient-angle {
      syntax: '<angle>';
      initial-value: 180deg;
      inherits: false;
    }

    @keyframes rotateGradient {
      0% { --gradient-angle: 0deg; }
      100% { --gradient-angle: 360deg; }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      background: transparent;
      overflow-x: hidden;
    }

    /* ========== 主容器 ========== */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 60px 40px 90px;
    }

    /* 主内容区域 - 整体垂直居中 */
    .main-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      margin: auto;
    }

    /* ========== 页面标题区 ========== */
    .page-header {
      text-align: center;
      margin-bottom: 88px;
      flex-shrink: 0;
    }

    /* 内容容器 - 固定高度区域 */
    .content-area {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 400px;
      width: 100%;
    }

    /* 品牌区域 - 固定在左上角 */
    .brand-section {
      position: absolute;
      top: 32px;
      left: 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 100;
    }

    .brand-icon {
      width: 44px;
      height: 44px;
      border-radius: 11px;
      box-shadow: 0 8px 32px rgba(0, 120, 212, 0.2);
      border: 1px solid rgba(0, 120, 212, 0.1);
      flex-shrink: 0;
    }

    @media (prefers-color-scheme: dark) {
      .brand-icon {
        box-shadow: 0 8px 32px rgba(0, 120, 212, 0.4);
        border: 2px solid rgba(255, 255, 255, 0.15);
      }
    }

    .brand-text {
      text-align: left;
    }

    .brand-name {
      font-size: 22px;
      font-weight: 700;
      color: #737373;
      line-height: 1.2;
    }

    .brand-slogan {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.2px;
      background: linear-gradient(90deg, #1a5fb4, #3584e4, #00b7c3, #2ec27e, #1a5fb4);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.4;
    }

    .brand-slogan .acronym {
      font-size: 14px;
      font-weight: 700;
    }

    @keyframes titleGradientFlow {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .page-title {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 24px;
      letter-spacing: -1px;
      /* 四色渐变流动动画 - 复制自 options.html */
      background: linear-gradient(90deg, #1a5fb4, #3584e4, #00b7c3, #2ec27e, #1a5fb4);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: titleGradientFlow 8s linear infinite;
    }

    .page-subtitle {
      font-size: 20px;
      color: var(--text-medium);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .page-subtitle::before,
    .page-subtitle::after {
      content: '';
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--text-light), transparent);
    }

    /* ========== 卡片容器 ========== */
    .features-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }

    /* ========== 功能卡片 ========== */
    .feature-card {
      width: 300px;
      /* 瓷器质感 - 与 Step1 一致 */
      background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.4));
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 24px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 
        0 10px 40px rgba(0,0,0,0.1),
        0 4px 8px rgba(0,0,0,0.12),
        inset 0 2px 4px rgba(255,255,255,1);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
      opacity: 0.6;
    }

    .feature-card.active {
      width: 380px;
      opacity: 1;
      /* 浮起 + 蓝色发光 - 与 Step1 hover 一致 */
      background: linear-gradient(135deg, #fff, #f0f8ff);
      border-color: #fff;
      box-shadow: 
        0 18px 40px rgba(30, 98, 150, 0.3),
        0 8px 20px rgba(30, 98, 150, 0.15),
        inset 0 2px 4px rgba(255,255,255,1);
      transform: translateY(-4px);
    }

    .feature-card:hover:not(.active) {
      opacity: 0.85;
    }

    @media (prefers-color-scheme: dark) {
      .feature-card {
        background: linear-gradient(135deg, rgba(40,40,50,0.9), rgba(30,30,40,0.85));
        border-color: rgba(255,255,255,0.1);
        box-shadow: 
          0 10px 40px rgba(0,0,0,0.2),
          0 4px 8px rgba(0,0,0,0.15),
          inset 0 2px 4px rgba(255,255,255,0.1);
      }
      .feature-card.active {
        background: linear-gradient(135deg, rgba(50,50,60,0.95), rgba(40,45,55,0.9));
        border-color: rgba(91, 184, 245, 0.3);
        box-shadow: 
          0 18px 40px rgba(30, 98, 150, 0.25),
          0 8px 20px rgba(0,0,0,0.3),
          inset 0 2px 4px rgba(255,255,255,0.1);
      }
    }

    /* ========== 动画演示区域 ========== */
    .demo-area {
      width: 100%;
      height: 180px;
      background: #f8f9fa;
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      margin-bottom: 20px;
      border: 1px solid rgba(0,0,0,0.06);
    }

    .feature-card.active .demo-area {
      height: 220px;
    }

    @media (prefers-color-scheme: dark) {
      .demo-area {
        background: rgba(20,20,25,0.8);
        border-color: rgba(255,255,255,0.08);
      }
      /* 拖拽演示 - 深色模式 */
      .drag-demo .page-content {
        color: #c0c0c0;
      }
      .drag-demo .page-content .highlight {
        background: rgba(100, 180, 255, 0.3);
      }
      .drag-demo .dragged-text {
        color: #fff;
        background: rgba(100, 180, 255, 0.4);
      }
      .drag-demo .search-popup {
        background: #2a2a35;
        color: #e0e0e0;
        box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      }
      /* 手势演示 - 深色模式 */
      .gesture-demo {
        background: rgba(30, 41, 59, 0.8) !important;
      }
      .gesture-demo .tab-bar {
        background: #334155 !important;
      }
      .gesture-demo .tab {
        background: #475569 !important;
      }
      .gesture-demo .tab-pill {
        background: #64748B;
      }
      .gesture-demo .page-area {
        background: #1E293B !important;
        border-color: #334155 !important;
      }
      .gesture-demo .right-click-hint {
        background: rgba(59, 130, 246, 0.2);
        color: #93C5FD;
      }
      .gesture-demo .scroll-wheel-icon {
        border-color: #60A5FA;
        background: rgba(59, 130, 246, 0.15);
      }
      .gesture-demo .scroll-wheel-icon::before {
        background: rgba(96, 165, 250, 0.4);
      }
      .gesture-demo .scroll-wheel-bar {
        background: #60A5FA;
      }
      /* 保存演示 - 深色模式 */
      .save-demo .fake-line {
        background: #3a3a45 !important;
      }
      .save-demo .sample-image,
      .save-demo .image-copy {
        border-color: rgba(255,255,255,0.15) !important;
      }
      .save-demo .download-icon {
        background: rgba(30, 35, 42, 0.9) !important;
        border-color: rgba(255,255,255,0.15) !important;
      }
      .save-demo .download-icon svg {
        color: #60a5fa !important;
      }
      .save-demo .alt-key {
        background: rgba(96, 165, 250, 0.15) !important;
        border-color: #60a5fa !important;
        color: #60a5fa !important;
      }
      .save-demo .alt-hint {
        color: #60a5fa !important;
      }
    }

    /* 动画播放控制 - 非激活卡片内所有动画暂停 */
    .feature-card:not(.active) .demo-area * {
      animation-play-state: paused !important;
    }

    /* ========== 卡片文字内容 ========== */
    .feature-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 8px;
      text-align: center;
    }

    .feature-card.active .feature-title {
      font-size: 22px;
    }

    .feature-desc {
      font-size: 14px;
      color: var(--text-medium);
      text-align: center;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    /* 操作方式标签 */
    .operation-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 20px;
    }

    .operation-tag svg {
      width: 14px;
      height: 14px;
    }

    @media (prefers-color-scheme: dark) {
      .operation-tag {
        background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.08) 100%);
        border: 1px solid rgba(255,255,255,0.1);
      }
    }

    /* ========== 底部导航 ========== */
    .nav-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 0;
      flex-shrink: 0;
      position: relative;
      width: 100%;
    }

    /* CTA 按钮 - 与 Step 1 一致 */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 56px;
      font-size: 24px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 
        inset 0 2px 4px rgba(0,0,0,0.3),
        inset 0 -1px 2px rgba(255,255,255,0.05),
        0 4px 16px rgba(0,0,0,0.2);
      text-shadow: 0 -1px 1px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.08);
      text-decoration: none;
    }

    .cta-btn:hover {
      transform: translateY(-4px);
      background: linear-gradient(145deg, #404040, #2a2a2a);
      box-shadow: 
        inset 0 2px 4px rgba(0,0,0,0.2),
        inset 0 -1px 2px rgba(255,255,255,0.08),
        0 12px 32px rgba(0,0,0,0.3),
        0 0 24px rgba(63, 169, 245, 0.2);
      border-color: rgba(63, 169, 245, 0.25);
    }

    .cta-btn:active {
      transform: translateY(0);
      box-shadow: 
        inset 0 3px 6px rgba(0,0,0,0.4),
        inset 0 -1px 1px rgba(255,255,255,0.03),
        0 2px 8px rgba(0,0,0,0.2);
    }

    /* 跳过链接 */
    .skip-link {
      color: var(--text-light);
      font-size: 14px;
      text-decoration: none;
      transition: color 0.2s;
    }

    .skip-link:hover {
      color: var(--text-medium);
    }

    /* 右上角步骤指示器 */
    .step-indicator {
      position: fixed;
      top: 36px;
      right: 40px;
      display: flex;
      align-items: center;
      gap: 0;
      z-index: 100;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .step-indicator .step-item {
      display: flex;
      align-items: center;
    }

    .step-indicator .step-line {
      width: 40px;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, #c0c0c0, transparent);
      margin: 0 4px;
    }

    .step-indicator .step-label {
      padding: 8px 16px;
      color: #a0a0a0;
      border-radius: 20px;
      transition: all 0.3s ease;
      background: transparent;
    }

    .step-indicator .step-label.active {
      color: #3B82F6;
      font-weight: 600;
      background: rgba(30, 98, 150, 0.08);
    }

    .step-indicator .step-label.completed {
      color: #666;
    }

    /* 可点击的步骤标签 */
    .step-indicator .step-label.clickable {
      cursor: pointer;
    }

    .step-indicator .step-label.clickable:hover {
      background: rgba(30, 98, 150, 0.06);
      color: #3B82F6;
    }

    @media (prefers-color-scheme: dark) {
      .step-indicator .step-label.clickable:hover {
        background: rgba(91, 184, 245, 0.08);
        color: #5bb8f5;
      }
    }

    /* 激活状态前后的横线颜色加深 */
    .step-indicator .step-item.active .step-line,
    .step-indicator .step-item.completed .step-line {
      background: linear-gradient(90deg, transparent, #3B82F6, transparent);
      opacity: 0.4;
    }

    @media (prefers-color-scheme: dark) {
      .step-indicator .step-line {
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      }
      .step-indicator .step-label {
        color: rgba(255,255,255,0.35);
      }
      .step-indicator .step-label.active {
        color: #5bb8f5;
        background: rgba(91, 184, 245, 0.1);
      }
      .step-indicator .step-label.completed {
        color: rgba(255,255,255,0.55);
      }
      .step-indicator .step-item.active .step-line,
      .step-indicator .step-item.completed .step-line {
        background: linear-gradient(90deg, transparent, #5bb8f5, transparent);
        opacity: 0.3;
      }
    }

    /* 小屏幕高度优化 - 解决布局拥挤问题 */
    @media (max-height: 900px) {
      .page {
        padding: 32px 40px 100px; /* 统一为标准内边距 (Step 1/3) */
      }
      
      .brand-section {
        top: 16px;  /* 统一 Brand 位置 (Step 1/3) */
        left: 32px;
      }
      
      .step-indicator {
        top: 20px;  /* 统一 Indicator 位置 (Step 1/3) */
        right: 32px;
      }
      
      .page-header {
        margin-bottom: 40px;
      }
      
      .page-title {
        font-size: 42px;
        margin-bottom: 16px;
      }
      
      .page-subtitle {
        font-size: 18px;
        gap: 16px;
      }
      
      /* === 核心修正：回退容器高度，保证小屏适配 === */
      .content-area {
        height: 380px; /* 回到紧凑高度，确保不破坏整体布局 */
      }
      
      .features-container {
        gap: 24px;
      }

      .feature-card {
        width: 270px; /* 进一步收窄卡片宽度 (285 -> 270)，看起来更精致 */
        padding: 24px 20px;
      }
      
      .feature-card.active {
        width: 335px; /* 对应缩小展开尺寸 (350 -> 335) */
      }
      
      /* === 魔法修正：高 CSS 像素 + 低 Zoom === */
      /* 原理：用 0.75 的缩放率，把 220px 的内容缩放到 165px 显示 */
      /* 结果：视觉上只占 165px (不撑破布局)，但逻辑上有 220px (内容不重叠) */
      .demo-area {
        zoom: 0.75;     /* 进一步缩小比例 */
        width: 133%;    /* 100% / 0.75 = 133% 宽度补偿 */
        height: 220px;  /* 逻辑高度充足，确保上下元素不打架 */
        margin-bottom: 16px; 
      }
      
      .feature-card.active .demo-area {
        height: 280px;  /* 逻辑高度充足 */
      }
      
      .feature-title {
        font-size: 20px;
      }
      
      .feature-card.active .feature-title {
        font-size: 22px;
      }
      
      .feature-desc {
        font-size: 14px;
        margin-bottom: 12px;
      }
      
      .operation-tag {
        padding: 8px 16px;
        font-size: 13px;
      }
      
      .cta-btn {
        padding: 14px 48px;
        font-size: 20px;
      }
      
      .nav-footer {
        margin-top: 32px;
      }
    }

    /* 极小屏幕高度 */
    @media (max-height: 700px) {
      .page {
        padding: 24px 32px 90px;
      }
      
      .page-header {
        margin-bottom: 32px;
      }
      
      .content-area {
        height: 320px;
      }
      
      .feature-card {
        width: 220px;
        padding: 16px;
      }
      
      .feature-card.active {
        width: 260px;
      }
      
      .feature-title {
        font-size: 16px;
      }
      .feature-card.active .feature-title {
        font-size: 18px;
      }
      
      .demo-area {
        height: 120px;
        margin-bottom: 12px;
      }
      .feature-card.active .demo-area {
        height: 150px;
      }
      
      .feature-desc {
        display: none; /* 极小屏隐藏描述 */
      }
    }

    /* back-link 已移除，导航功能由步骤指示器承担 */

    /* Footer */
    .fre-footer {
      position: fixed;
      bottom: 12px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 10;
    }
    .fre-footer .footer-text {
      font-size: 14px;
      color: #999;
      line-height: 1.4;
    }
    @media (prefers-color-scheme: dark) {
      .fre-footer .footer-text {
        color: rgba(255, 255, 255, 0.5);
      }
    }

    /* ========== 动画通用样式 ========== */
    
    .demo-area {
      transition: height 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    /* 1. 全局重置：默认停止所有动画，隐藏动态元素 */
    .demo-area * {
      animation: none !important;
    }

    /* 动态元素默认隐藏 */
    .dragged-text,
    .search-popup,
    .select-highlight,
    .drag-trail,
    .search-loading,
    .new-tab,
    .right-click-mark,
    .right-click-hint,
    .scroll-wheel-icon,
    .scroll-indicator,
    .save-success,
    .image-copy {
      opacity: 0;
    }

    /* 静态元素默认可见 */
    .cursor,
    .sample-image,
    .tab-bar,
    .tab,
    .alt-key,
    .download-icon {
      opacity: 1;
    }
    
    /* 2. 激活状态下的动画规则 - 仅当 .animating 存在时触发 */
    
    /* --- Drag Demo (重做版 v3) --- */
    .active .drag-demo.animating .cursor { 
      animation: cursor-drag-v3 4.5s linear infinite !important; 
    }
    .active .drag-demo.animating .select-highlight { 
      animation: select-expand-v3 4.5s linear infinite !important; 
    }
    .active .drag-demo.animating .keyword-text { 
      animation: keyword-invert 4.5s linear infinite !important; 
    }
    .active .drag-demo.animating .dragged-text { 
      animation: drag-text-v3 4.5s linear infinite !important; 
    }
    .active .drag-demo.animating .new-tab { 
      animation: new-tab-appear 4.5s linear infinite !important; 
    }
    .active .drag-demo.animating .new-tab .tab-pill { 
      animation: new-tab-pill 4.5s linear infinite !important; 
    }
    
    /* 光标：左侧中间静止 → 右移框选 → 下压 → 向右上拖拽一小段 → 释放 */
    @keyframes cursor-drag-v3 {
      0%, 6% { transform: translate(0, 0) scale(1); }
      /* 框选阶段 */
      7% { transform: translate(0, 0) scale(1); }
      20% { transform: translate(46px, 0) scale(1); }
      /* 按下准备拖拽 */
      22%, 26% { transform: translate(46px, 0) scale(0.88); }
      /* 拖拽开始 */
      28% { transform: translate(46px, 0) scale(0.92); }
      /* 向右上拖拽一小段 */
